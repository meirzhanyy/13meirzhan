<h2>Өнім қосу</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Аты">
    <input type="number" name="price" placeholder="Бағасы">

    <select name="category">
        {% for c in categories %}
            <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Қосу</button>
</form>
