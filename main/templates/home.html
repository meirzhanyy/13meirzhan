{% extends 'base.html' %}

{% block title %}Басты бет - Санаттар{% endblock %}

{% block content %}
    <h2>Санаттар тізімі</h2>
    <ul>
        {% for category in categories %}
            <li>
                <a href="{% url 'catalog' category.id %}">{{ category.name }}</a>
            </li>
        {% empty %}
            <li>Санаттар әлі қосылмаған.</li>
        {% endfor %}
    </ul>
{% endblock %}
