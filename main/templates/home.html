{% extends 'base.html' %}

{% block title %}Басты бет{% endblock %}

{% block content %}
<h2>Санаттар</h2>

<ul>
    {% for category in categories %}
        <li>
            <a href="{% url 'catalog' category.id %}">
                {{ category.name }}
            </a>
        </li>
    {% empty %}
        <li>Санаттар жоқ</li>
    {% endfor %}
</ul>
{% endblock %}
